  :root{

      --paper-raised: #1E241A;

      --ink-soft: #A9B4A0;
      --line: #3B4436;
      --alert: #E28A78;
      --alert-bg: #3A211D;
      --clear: #86C4A3;
      --clear-bg: #1C2A20;
      --stamp: #9C3323;
    }

  *{box-sizing:border-box;}
  html{color-scheme: light dark;}
  html,body{margin:0;padding:0;background:var(--paper);}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    line-height:1.6;
    min-height:100vh;
  }

  .wrap{max-width:760px;margin:0 auto;padding:32px 20px 80px;}

  header.masthead{
    border-bottom:3px double var(--ink);
    padding-bottom:18px;
    margin-bottom:28px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:.12em;
    color:var(--ink);
    font-weight:600;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  h1{
    font-family:'Noto Serif TC', serif;
    font-weight:900;
    font-size:clamp(26px,5vw,34px);
    margin:0 0 10px;
    letter-spacing:.01em;
  }
  .lede{
    font-size:14.5px;
    color:var(--ink-soft);
    max-width:56ch;
  }

  .privacy-note{
    display:flex;
    gap:10px;
    align-items:flex-start;
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-left:4px solid var(--clear);
    padding:12px 14px;
    margin:20px 0 28px;
    font-size:13px;
    color:var(--ink-soft);
  }
  .privacy-note b{color:var(--ink);}

  .dropzone{
    border:2px dashed var(--ink-soft);
    background:var(--paper-raised);
    padding:36px 20px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .dropzone.drag{
    border-color:var(--stamp);
    background:var(--paper-raised);
  }
  .dropzone .icon{font-size:30px;margin-bottom:8px;}
  .dropzone .main-text{font-weight:700;font-size:15px;}
  .dropzone .sub-text{font-size:12.5px;color:var(--ink-soft);margin-top:4px;}
  input[type=file]{display:none;}

  .filename-bar{
    display:none;
    align-items:center;
    justify-content:space-between;
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-top:none;
    padding:10px 14px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
  }
  .filename-bar button{
    background:none;border:none;color:var(--alert);
    cursor:pointer;font-family:inherit;font-size:12.5px;
    text-decoration:underline;
  }

  section.results{margin-top:36px;}
  .summary-row{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    margin-bottom:24px;
  }
  .stat{
    flex:1;
    min-width:120px;
    background:var(--paper-raised);
    border:1px solid var(--line);
    padding:14px 16px;
  }
  .stat .num{
    font-family:'Noto Serif TC',serif;
    font-weight:900;
    font-size:28px;
    line-height:1;
  }
  .stat.flagged .num{color:var(--alert);}
  .stat .label{font-size:12px;color:var(--ink-soft);margin-top:6px;}

  .section-title{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:17px;
    margin:28px 0 12px;
    padding-bottom:6px;
    border-bottom:1px solid var(--line);
  }

  .match-card{
    position:relative;
    background:var(--paper-raised);
    border:1px solid var(--alert);
    border-left:5px solid var(--alert);
    padding:16px 18px;
    margin-bottom:14px;
  }
  .match-card .stamp-tag{
    position:absolute;
    top:14px;
    right:16px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    font-weight:700;
    color:#fff;
    background:var(--stamp);
    padding:3px 8px;
    letter-spacing:.05em;
    transform:rotate(2deg);
  }
  .match-card .item-name{
    font-weight:700;
    font-size:15.5px;
    margin:0 0 8px;
    padding-right:70px;
  }
  .match-card .meta{
    font-size:12.5px;
    color:var(--ink-soft);
    margin-bottom:10px;
  }
  .match-card .against{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    background:var(--alert-bg);
    padding:8px 10px;
    border-radius:2px;
  }
  .match-card .against b{display:block;font-family:'Noto Sans TC',sans-serif;font-size:13px;margin-bottom:2px;}

  .clear-list{
    background:var(--paper-raised);
    border:1px solid var(--line);
    padding:14px 16px;
  }
  .clear-list summary{
    cursor:pointer;
    font-weight:700;
    font-size:14px;
    color:var(--clear);
  }
  .clear-list ul{
    list-style:none;
    margin:12px 0 0;
    padding:0;
    columns:2;
    column-gap:20px;
  }
  .clear-list li{
    font-size:12.5px;
    color:var(--ink-soft);
    padding:3px 0;
    break-inside:avoid;
  }

  .empty-state{
    text-align:center;
    padding:24px;
    color:var(--ink-soft);
    font-size:13.5px;
  }

  footer{
    margin-top:40px;
    padding-top:16px;
    border-top:1px solid var(--line);
    font-size:11.5px;
    color:var(--ink-soft);
  }

  @media (max-width:480px){
    .clear-list ul{columns:1;}
  }
</style>

</div>

function normalize(s){
  if(!s) return '';
  return String(s)
    .replace(/[\s()（）\[\]【】\-\/、,，。.．·]/g,'')
    .toUpperCase();
}

// pre-normalize recall list once
const normalizedRecall = RECALL_LIST.map(r => ({
  vendor: r.vendor,
  product: r.product,
  norm: normalize(r.product)
})).filter(r => r.norm.length >= 2);

function findMatches(itemName){
  const norm = normalize(itemName);
  if(norm.length < 2) return [];
  const hits = [];
  for(const r of normalizedRecall){
    if(norm.includes(r.norm) || r.norm.includes(norm)){
      hits.push(r);
    }
  }
  return hits;
}

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const filenameBar = document.getElementById('filenameBar');
const filenameText = document.getElementById('filenameText');
const clearBtn = document.getElementById('clearBtn');
const resultsEl = document.getElementById('results');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag');
  if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if(e.target.files.length) handleFile(e.target.files[0]);
});
clearBtn.addEventListener('click', () => {
  fileInput.value = '';
  filenameBar.style.display = 'none';
  dropzone.style.display = 'block';
  resultsEl.style.display = 'none';
  resultsEl.innerHTML = '';
});

function handleFile(file){
  filenameText.textContent = '已選擇：' + file.name;
  filenameBar.style.display = 'flex';
  dropzone.style.display = 'none';

  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    Papa.parse(text, {
      header: true,
      skipEmptyLines: true,
      complete: (parsed) => {
        processRows(parsed.data);
      },
      error: (err) => {
        resultsEl.style.display = 'block';
        resultsEl.innerHTML = '<div class="empty-state">CSV 解析失敗，請確認檔案格式。</div>';
      }
    });
  };
  reader.readAsText(file, 'UTF-8');
}

function processRows(rows){
  const nameKey = '消費明細_品名';
  const hasKey = rows.length && Object.prototype.hasOwnProperty.call(rows[0], nameKey);

  if(!hasKey){
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = '<div class="empty-state">找不到「' + nameKey + '」欄位，請確認上傳的是電子發票消費明細 CSV。</div>';
    return;
  }

  const seen = new Map(); // itemName -> {count, sample row}
  for(const row of rows){
    const name = (row[nameKey] || '').trim();
    if(!name) continue;
    if(!seen.has(name)) seen.set(name, { count: 0, row });
    seen.get(name).count++;
  }

  const flagged = [];
  const clear = [];

  for(const [name, info] of seen.entries()){
    const hits = findMatches(name);
    if(hits.length){
      flagged.push({ name, hits, row: info.row, count: info.count });
    }else{
      clear.push(name);
    }
  }

  renderResults(flagged, clear, seen.size);
}

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderResults(flagged, clear, total){
  resultsEl.style.display = 'block';

  let html = '';
  html += '<div class="summary-row">';
  html += '<div class="stat"><div class="num">' + total + '</div><div class="label">發票品項（去重複）</div></div>';
  html += '<div class="stat flagged"><div class="num">' + flagged.length + '</div><div class="label">疑似相符品項</div></div>';
  html += '<div class="stat"><div class="num">' + clear.length + '</div><div class="label">未發現相符</div></div>';
  html += '</div>';

  if(flagged.length){
    html += '<div class="section-title">⚠️ 疑似相符 · 請人工確認</div>';
    for(const f of flagged){
      const dateStr = f.row['發票日期'] || '';
      const invNo = f.row['發票號碼'] || '';
      const seller = f.row['賣方名稱'] || '';
      html += '<div class="match-card">';
      html += '<div class="stamp-tag">需確認</div>';
      html += '<p class="item-name">' + esc(f.name) + '</p>';
      html += '<div class="meta">發票 ' + esc(invNo) + ' · ' + esc(dateStr) + ' · 賣方：' + esc(seller) + (f.count > 1 ? ' · 出現 ' + f.count + ' 次' : '') + '</div>';
      for(const h of f.hits){
        html += '<div class="against"><b>' + esc(h.product) + '</b>清單業者：' + esc(h.vendor) + '</div>';
      }
      html += '</div>';
    }
  }else{
    html += '<div class="section-title">⚠️ 疑似相符 · 請人工確認</div>';
    html += '<div class="empty-state">沒有發現相符品項。</div>';
  }

  html += '<details class="clear-list">';
  html += '<summary>查看未發現相符的 ' + clear.length + ' 個品項</summary>';
  html += '<ul>';
  for(const name of clear){
    html += '<li>' + esc(name) + '</li>';
  }
  html += '</ul></details>';

  resultsEl.innerHTML = html;
}
